services:
  postgres:
    image: postgres:16
    container_name: readquest_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: readquest_db
    ports:
      - "5433:5432"
    volumes:
      - readquest_pg_data:/var/lib/postgresql/data

volumes:
  readquest_pg_data: